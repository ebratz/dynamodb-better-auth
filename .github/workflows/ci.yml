name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies (no lockfile — works around npm bug #4828)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --legacy-peer-deps
      - run: npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies (no lockfile — works around npm bug #4828)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --legacy-peer-deps
      - run: npx vitest run --exclude 'test/adapter.test.ts'

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports: ["8000:8000"]
        options: >-
          --health-cmd "curl -s http://localhost:8000/shell/ || exit 1"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies (no lockfile — works around npm bug #4828)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --legacy-peer-deps
      - name: Create DynamoDB tables
        run: |
          # Users
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name test-users \
            --attribute-definitions '[
              {"AttributeName":"id","AttributeType":"S"},
              {"AttributeName":"email","AttributeType":"S"}
            ]' \
            --key-schema '[{"AttributeName":"id","KeyType":"HASH"}]' \
            --global-secondary-indexes '[{
              "IndexName":"email-index",
              "KeySchema":[{"AttributeName":"email","KeyType":"HASH"}],
              "Projection":{"ProjectionType":"ALL"}
            }]' \
            --billing-mode PAY_PER_REQUEST

          # Sessions
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name test-sessions \
            --attribute-definitions '[
              {"AttributeName":"token","AttributeType":"S"},
              {"AttributeName":"userId","AttributeType":"S"},
              {"AttributeName":"id","AttributeType":"S"}
            ]' \
            --key-schema '[{"AttributeName":"token","KeyType":"HASH"}]' \
            --global-secondary-indexes '[
              {"IndexName":"userId-index","KeySchema":[{"AttributeName":"userId","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}},
              {"IndexName":"by-id","KeySchema":[{"AttributeName":"id","KeyType":"HASH"}],"Projection":{"ProjectionType":"KEYS_ONLY"}}
            ]' \
            --billing-mode PAY_PER_REQUEST

          # Accounts
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name test-accounts \
            --attribute-definitions '[
              {"AttributeName":"providerId","AttributeType":"S"},
              {"AttributeName":"accountId","AttributeType":"S"},
              {"AttributeName":"id","AttributeType":"S"},
              {"AttributeName":"userId","AttributeType":"S"}
            ]' \
            --key-schema '[
              {"AttributeName":"providerId","KeyType":"HASH"},
              {"AttributeName":"accountId","KeyType":"RANGE"}
            ]' \
            --global-secondary-indexes '[
              {"IndexName":"by-id","KeySchema":[{"AttributeName":"id","KeyType":"HASH"}],"Projection":{"ProjectionType":"KEYS_ONLY"}},
              {"IndexName":"by-userId","KeySchema":[{"AttributeName":"userId","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}
            ]' \
            --billing-mode PAY_PER_REQUEST

          # Verifications
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name test-verifications \
            --attribute-definitions '[
              {"AttributeName":"id","AttributeType":"S"},
              {"AttributeName":"identifier","AttributeType":"S"}
            ]' \
            --key-schema '[{"AttributeName":"id","KeyType":"HASH"}]' \
            --global-secondary-indexes '[{
              "IndexName":"identifier-index",
              "KeySchema":[{"AttributeName":"identifier","KeyType":"HASH"}],
              "Projection":{"ProjectionType":"ALL"}
            }]' \
            --billing-mode PAY_PER_REQUEST

          # EmailLookups
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name test-email-lookups \
            --attribute-definitions '[{"AttributeName":"email","AttributeType":"S"}]' \
            --key-schema '[{"AttributeName":"email","KeyType":"HASH"}]' \
            --billing-mode PAY_PER_REQUEST

          echo "All tables created"
        env:
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake
          AWS_DEFAULT_REGION: us-east-1
      - name: Run integration tests
        run: npx vitest run test/adapter.test.ts
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake
          AWS_DEFAULT_REGION: us-east-1

  pack-smoke:
    runs-on: ubuntu-latest
    needs: [unit-tests, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (no lockfile — works around npm bug #4828)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund --legacy-peer-deps
      - run: npm run build
      - run: npm pack
      - name: Verify package imports from a consumer
        run: |
          mkdir /tmp/consumer && cd /tmp/consumer
          npm init -y
          npm install --legacy-peer-deps $GITHUB_WORKSPACE/ebratz-dynamodb-better-auth-*.tgz \
                     @aws-sdk/client-dynamodb \
                     @aws-sdk/lib-dynamodb \
                     @aws-sdk/util-dynamodb \
                     better-auth
          node -e "const m=require('@ebratz/dynamodb-better-auth'); if(typeof m.dynamodbAdapter!=='function')process.exit(1); console.log('OK')"
