name: Release

# Triggered on every push to main. Two jobs:
#   1. release-please opens/updates a Release PR with the next version bump
#      derived from conventional commits (feat/fix/feat!).
#   2. When the Release PR is merged, release-please creates a GitHub release
#      and tag; the publish job then runs and ships to npm with provenance.
#
# Both jobs run in the same workflow so the publish step can read
# release-please's output directly — sidesteps the default GITHUB_TOKEN
# cross-workflow trigger restriction.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write  # required for npm provenance

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies (no lockfile — works around npm bug #4828)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
